<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Focus - Your Calm Environment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="video-container">
            <video id="environment-video" autoplay loop muted playsinline></video>
            <div id="drag-overlay"></div>
        </div>
        
        <div class="overlay"></div>

        <div class="content">
            <div class="header">
                <h1>IMMERSIVE FOCUS</h1>
                <p>your calm environment for deep work</p>
            </div>

            <div class="controls-area">
                <div class="angle-selector">
                    <button class="angle-btn active" data-angle="perspective">Perspective</button>
                    <button class="angle-btn" data-angle="front">Front</button>
                    <button class="angle-btn" data-angle="side">Side</button>
                    <button class="angle-btn" data-angle="top">Top</button>
                </div>
            </div>
        </div>

        <div class="music-player">
            <div class="music-info">
                <div class="music-title" id="current-track-title">Gentle Rain</div>
                <div class="track-position" id="track-position">1/4</div>
            </div>
            <div class="music-controls">
                <button class="music-btn" id="prev-track" title="Previous track">⏮</button>
                <button class="music-btn play-pause" id="play-pause" title="Play/Pause">⏸</button>
                <button class="music-btn" id="next-track" title="Next track">⏭</button>
            </div>
        </div>

        <div class="footer">
            <span>find your focus</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
