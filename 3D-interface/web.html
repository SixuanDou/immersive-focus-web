<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Focus · Calm Environment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a1a2f 0%, #1a3b5a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Video background layer */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #environment-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) saturate(1.1);
        }

        /* Invisible overlay for mouse drag detection */
        #drag-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            cursor: grab;
            background: transparent;
        }

        #drag-overlay:active {
            cursor: grabbing;
        }

        /* Dark gradient overlay for text readability */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(10, 26, 47, 0.3) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* UI content layer - above video */
        .content {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            pointer-events: none;
        }

        .header {
            text-align: center;
            animation: fadeIn 2s ease;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1rem;
            font-weight: 300;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .controls-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            animation: slideUp 1.5s ease;
        }

        /* Camera angle buttons */
        .angle-selector {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 0.8rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
        }

        .angle-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .angle-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.15);
        }

        .angle-btn.active {
            background: rgba(173, 216, 230, 0.3);
            color: white;
            border-color: rgba(173, 216, 230, 0.5);
            box-shadow: 0 4px 15px rgba(173, 216, 230, 0.2);
        }

        /* Music player - bottom right */
        .music-player {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 3;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-width: 280px;
            pointer-events: auto;
        }

        .music-info {
            flex: 1;
            padding-left: 1rem;
        }

        .music-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            margin-bottom: 0.2rem;
        }

        .track-position {
            font-size: 0.65rem;
            opacity: 0.5;
            color: #aaccff;
            margin-top: 0.2rem;
            letter-spacing: 0.5px;
        }

        .music-controls {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .music-btn {
            background: transparent;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.2rem;
        }

        .music-btn:hover {
            background: rgba(173, 216, 230, 0.3);
            transform: scale(1.05);
        }

        .music-btn.play-pause {
            background: rgba(173, 216, 230, 0.4);
            width: 48px;
            height: 48px;
        }

        .music-btn.play-pause:hover {
            background: rgba(173, 216, 230, 0.6);
        }

        /* Bottom left footer text */
        .footer {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            z-index: 3;
            font-size: 1rem;
            font-weight: 300;
            opacity: 0.5;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }

        .footer:hover {
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .content { padding: 1rem; }
            .header h1 { font-size: 1.8rem; }
            .angle-selector { border-radius: 30px; padding: 0.5rem; }
            .angle-btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
            .music-player { bottom: 1rem; right: 1rem; min-width: 240px; }
            .footer { bottom: 1rem; left: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Video background with drag overlay -->
        <div class="video-container">
            <video id="environment-video" autoplay loop muted playsinline></video>
            <div id="drag-overlay"></div>
        </div>
        
        <div class="overlay"></div>

        <!-- Main UI -->
        <div class="content">
            <div class="header">
                <h1>IMMERSIVE FOCUS</h1>
                <p>your calm environment for deep work</p>
            </div>

            <div class="controls-area">
                <div class="angle-selector">
                    <button class="angle-btn active" data-angle="perspective">Perspective</button>
                    <button class="angle-btn" data-angle="front">Front</button>
                    <button class="angle-btn" data-angle="side">Side</button>
                    <button class="angle-btn" data-angle="top">Top</button>
                </div>
            </div>
        </div>

        <!-- Music controls -->
        <div class="music-player">
            <div class="music-info">
                <div class="music-title" id="current-track-title">Gentle Rain</div>
                <div class="track-position" id="track-position">1/4</div>
            </div>
            <div class="music-controls">
                <button class="music-btn" id="prev-track" title="Previous track">⏮</button>
                <button class="music-btn play-pause" id="play-pause" title="Play/Pause">⏸</button>
                <button class="music-btn" id="next-track" title="Next track">⏭</button>
            </div>
        </div>

        <div class="footer">
            <span>find your focus</span>
        </div>
    </div>

    <script>
        // Video file paths
        const videoSources = {
            perspective: 'video/Perspective.mp4',
            front: 'video/Front.mp4',
            side: 'video/Side.mp4',
            top: 'video/Top.mp4' 
        };

        // Music tracks
        const musicTracks = [
            { title: "Gentle Rain", src: "music/rain.mp3" },
            { title: "Calm Waves", src: "music/waves.mp3" },
            { title: "Keyboard Whisper", src: "music/keyboard.mp3" },
            { title: "White Noise", src: "music/white-noise.mp3" }
        ];

        const videoElement = document.getElementById('environment-video');
        const angleButtons = document.querySelectorAll('.angle-btn');
        const dragOverlay = document.getElementById('drag-overlay');
        let currentAngle = 'perspective';
        let isDragging = false;
        let startX;
        const dragThreshold = 30;

        // Switch between camera angles
        function loadVideo(angle) {
            if (videoSources[angle]) {
                videoElement.src = videoSources[angle];
                videoElement.load();
                videoElement.play().catch(e => console.log('Autoplay prevented:', e));
                
                // Update active button state
                angleButtons.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.angle === angle) {
                        btn.classList.add('active');
                    }
                });
                
                currentAngle = angle;
            }
        }

        // Start with perspective view
        loadVideo('perspective');

        // Button click handlers
        angleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                loadVideo(btn.dataset.angle);
            });
        });

        // Drag to change angle
        dragOverlay.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            dragOverlay.style.cursor = 'grabbing';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - startX;
            
            if (Math.abs(deltaX) > dragThreshold) {
                const angleOrder = ['perspective', 'front', 'side', 'top'];
                const currentIndex = angleOrder.indexOf(currentAngle);
                
                if (deltaX > 0) {
                    const nextIndex = (currentIndex + 1) % angleOrder.length;
                    loadVideo(angleOrder[nextIndex]);
                } else {
                    const prevIndex = (currentIndex - 1 + angleOrder.length) % angleOrder.length;
                    loadVideo(angleOrder[prevIndex]);
                }
                
                startX = e.clientX;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            dragOverlay.style.cursor = 'grab';
        });

        dragOverlay.addEventListener('mouseleave', () => {
            isDragging = false;
            dragOverlay.style.cursor = 'grab';
        });

        // Audio player
        const audioPlayer = new Audio();
        let currentTrackIndex = 0;
        let isPlaying = true;

        const playPauseBtn = document.getElementById('play-pause');
        const prevBtn = document.getElementById('prev-track');
        const nextBtn = document.getElementById('next-track');
        const trackTitle = document.getElementById('current-track-title');
        const trackPosition = document.getElementById('track-position');

        function loadTrack(index) {
            const track = musicTracks[index];
            if (track) {
                audioPlayer.src = track.src;
                trackTitle.textContent = track.title;
                
                const totalTracks = musicTracks.length;
                trackPosition.textContent = `${index + 1}/${totalTracks}`;

                if (isPlaying) {
                    audioPlayer.play().catch(e => {
                        console.log('Audio autoplay prevented:', e);
                        isPlaying = false;
                        playPauseBtn.textContent = '▶';
                    });
                }
            }
        }

        if (musicTracks.length > 0) {
            loadTrack(0);
        }

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audioPlayer.pause();
                playPauseBtn.textContent = '▶';
            } else {
                audioPlayer.play().catch(e => console.log('Play failed:', e));
                playPauseBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        });

        nextBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % musicTracks.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                audioPlayer.play().catch(e => console.log('Play failed:', e));
            }
        });

        prevBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex - 1 + musicTracks.length) % musicTracks.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                audioPlayer.play().catch(e => console.log('Play failed:', e));
            }
        });

        audioPlayer.addEventListener('ended', () => {
            if (isPlaying) {
                audioPlayer.currentTime = 0;
                audioPlayer.play().catch(e => console.log('Play failed:', e));
            }
        });

        audioPlayer.addEventListener('error', (e) => {
            console.error('Audio error:', e);
            trackTitle.textContent = 'Track unavailable';
        });

        // Pause video when tab is inactive
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                videoElement.pause();
            } else {
                videoElement.play().catch(e => console.log('Play resumed:', e));
            }
        });
    </script>
</body>
</html>
